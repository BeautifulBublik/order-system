spring:
  mvc:
    problem-details:
      enabled: true
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5432/orders
    driver-class-name: org.postgresql.Driver
    password: postgres
    username: postgres
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: order-service-group


server:
  port: 8080

payment-service:
  base-url: http://localhost:8081

order-paid-topic: order.event
delivery-assigned-topic: delivery.events
